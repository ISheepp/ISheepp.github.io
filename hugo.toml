baseURL = "https://ISheepp.github.io/"
languageCode = "zh-cn"
title = "Beaulo's Blog"
theme = "PaperMod"

[pagination]
pagerSize = 10

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[params]
env = "production"
description = "记录开发、AI Agent、创业项目和技术思考。"
author = "Beaulo"
defaultTheme = "auto"
ShowReadingTime = true
ShowShareButtons = false
ShowCodeCopyButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowToc = true
TocOpen = true
ShowWordCount = true
ShowRssButtonInSectionTermList = true
UseHugoToc = true
disableSpecial1stPost = false

[params.homeInfoParams]
Title = "Hi, 我是 Beaulo 👋"
Content = "独立开发者 / 后端工程师，长期关注 AI Agent、Go 后端、React Native 和创业项目。这里记录我做产品、写代码、踩坑复盘和持续迭代中的思考。\n\n邮箱：[lzyoutlook@gamil.com](mailto:lzyoutlook@gamil.com)  ·  X：[ISheep_L](https://twitter.com/ISheep_L)  ·  Instagram：[isheep.p](https://www.instagram.com/isheep.p/)"

[[params.socialIcons]]
name = "github"
url = "https://github.com/ISheepp"

[[params.socialIcons]]
name = "x"
url = "https://twitter.com/ISheep_L"

[[params.socialIcons]]
name = "instagram"
url = "https://www.instagram.com/isheep.p/"

[[params.socialIcons]]
name = "email"
url = "mailto:lzyoutlook@gamil.com"

[[menu.main]]
identifier = "posts"
name = "文章"
url = "/posts/"
weight = 10

[[menu.main]]
identifier = "archives"
name = "归档"
url = "/archives/"
weight = 20

[[menu.main]]
identifier = "tags"
name = "标签"
url = "/tags/"
weight = 30

[[menu.main]]
identifier = "search"
name = "搜索"
url = "/search/"
weight = 40

[[menu.main]]
identifier = "about"
name = "关于"
url = "/posts/about/"
weight = 50

[outputs]
home = ["HTML", "RSS", "JSON"]
